apiVersion: apps/v1
kind: Deployment

metadata:
  name: hello-fastapi

spec:
  replicas: 1

  selector:
    matchLabels:
      app: hello-fastapi

  template:

    metadata:
      labels:
        app: hello-fastapi

    spec:

      containers:

      - name: hello-fastapi

        image: akspracticeacr26abin.azurecr.io/hello-fastapi:v1

        imagePullPolicy: Always

        ports:

        - containerPort: 8000

        envFrom:
          - configMapRef:
              name: hello-fastapi-config

        readinessProbe:
          httpGet:
            path: /health
            port: 8000

          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8000

          initialDelaySeconds: 15
          periodSeconds: 20

        resources:

          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"